    }

<body>
  <div id="page-splash" class="page active">
    <div class="splash-bg">
      <div class="splash-overlay"></div>
    </div>
    <div class="splash-logo">PakeLagi</div>
    <div class="splash-bottom">
      <button class="btn-primary" onclick="goTo('page-register')">Daftar akun</button>
      <p class="splash-login-text">Sudah punya akun? <a href="#" onclick="goTo('page-login')">Login</a></p>
    </div>
  </div>

  <!--HALAMAN LOGIN-->
  <div id="page-login" class="page">
    <div class="auth-page">
      <div class="auth-illustration login-illo">
        <div class="illo-bg-blob blob1"></div>
        <div class="illo-bg-blob blob2"></div>
        <div class="phone-card">
          <div class="phone-avatar"></div>
          <div class="phone-bar bar1"></div>
          <div class="phone-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="illo-person person-left">
          <div class="p-head"></div>
          <div class="p-body body-purple"></div>
        </div>
        <div class="illo-person person-right">
          <div class="p-head p-head-dark"></div>
          <div class="p-body body-dark"></div>
          <div class="p-laptop"></div>
        </div>
      </div>

      <div class="auth-content">
        <h1 class="auth-title">Login</h1>
        <p class="auth-subtitle">Lakukan login untuk melanjutkan.</p>

        <div class="form-group">
          <label class="form-label">Alamat email <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input type="email" class="form-input" placeholder="Masukkan alamat email Anda" id="login-email" />
          </div>
          <span class="field-error" id="err-login-email"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Kata Sandi <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" class="form-input" placeholder="Masukkan sandi Anda" id="login-pass" />
            <button class="toggle-pass" onclick="togglePass('login-pass', this)">👁</button>
          </div>
          <span class="field-error" id="err-login-pass"></span>
        </div>

        <div class="form-spacer"></div>

        <button class="btn-primary full-width" onclick="handleLogin()">Login</button>
        <p class="auth-switch">Belum punya akun? <a href="#" onclick="goTo('page-register')">Daftar</a></p>
      </div>
    </div>
  </div>

  <!--HALAMAN REGISTER-->
  <div id="page-register" class="page">
    <div class="auth-page">
      <div class="auth-illustration register-illo">
        <div class="reg-illo-inner">
          <div class="reg-shield">🔒</div>
          <div class="reg-envelope">
            <div class="env-person"></div>
          </div>
          <div class="reg-gear gear1">⚙</div>
          <div class="reg-gear gear2">⚙</div>
          <div class="reg-leaf leaf1"></div>
          <div class="reg-leaf leaf2"></div>
        </div>
      </div>

      <div class="auth-content">
        <h1 class="auth-title">Registrasi</h1>
        <p class="auth-subtitle">Lakukan registrasi untuk login.</p>

        <div class="form-group">
          <label class="form-label">Alamat email <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input type="email" class="form-input" placeholder="Masukkan alamat email Anda" id="reg-email" />
          </div>
          <span class="field-error" id="err-reg-email"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Nomor telepon <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">📞</span>
            <input type="tel" class="form-input" placeholder="Cth: 08xxxxxxxxxx" id="reg-phone" />
          </div>
          <span class="field-error" id="err-reg-phone"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Nama</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" class="form-input" placeholder="Anda ingin dipanggil apa?" id="reg-name" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Kata Sandi <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" class="form-input" placeholder="Min. 6 karakter, 1 angka, 1 karakter khusus"
              id="reg-pass" />
            <button class="toggle-pass" onclick="togglePass('reg-pass', this)">👁</button>
          </div>
          <span class="field-error" id="err-reg-pass"></span>
        </div>

        <div class="form-spacer"></div>

        <button class="btn-primary full-width" onclick="handleRegister()">Daftar</button>
        <p class="auth-switch">Sudah punya akun? <a href="#" onclick="goTo('page-login')">Login</a></p>
      </div>
    </div>
  </div>

  <!--POP UP SUKSES-->
  <div id="page-success" class="page">
    <div class="success-screen">
      <div class="success-icon">✓</div>
      <h2 class="success-title">Berhasil!</h2>
      <p class="success-msg" id="success-msg">Anda telah berhasil masuk.</p>
      <button class="btn-primary" onclick="goTo('page-splash')">Kembali ke Beranda</button>
    </div>
  </div>

  <!--TOAST-->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>

</html>
